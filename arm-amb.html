<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>АРМ Амбулаторная история</title>
    <link rel="stylesheet" href="https://dev.max.ru/ui/main.min.css">
    <style>
        :root { --primary-teal: #26a69a; --primary-dark: #00897b; --primary-light: #e0f2f1; --card-shadow: rgba(38,166,154,0.12); }
        body { background-color: var(--primary-light) !important; color: #1a2a2a; font-family: -apple-system, sans-serif; padding: 16px; margin: 0; min-height: 100vh; }
        .instruction-card { background-color: #fff; border-radius: 16px; padding: 20px 18px; margin-bottom: 18px; box-shadow: 0 4px 12px var(--card-shadow); border: 1px solid rgba(38,166,154,0.08); }
        .instruction-card h2 { margin-top: 0; margin-bottom: 12px; color: var(--primary-dark); font-size: 19px; font-weight: 600; border-bottom: 2px solid var(--primary-teal); padding-bottom: 10px; }
        .instruction-card ul { padding-left: 20px; margin-bottom: 0; list-style: none; }
        .instruction-card ul li { position: relative; padding-left: 24px; margin-bottom: 10px; line-height: 1.5; font-size: 15px; }
        .instruction-card ul li::before { content: "•"; color: var(--primary-teal); font-size: 20px; position: absolute; left: 0; top: -2px; }
        .instruction-card ul li strong { color: var(--primary-dark); }
        .nav-buttons { display: flex; gap: 12px; margin-top: 24px; }
        .nav-buttons a, .nav-buttons button { flex: 1; padding: 14px 10px; border: none; border-radius: 30px; font-size: 16px; font-weight: 500; cursor: pointer; text-align: center; text-decoration: none; display: inline-block; box-sizing: border-box; }
        .btn-back { background-color: var(--primary-teal); color: #fff; box-shadow: 0 4px 8px rgba(38,166,154,0.25); }
        .btn-back:active { background-color: var(--primary-dark); transform: scale(0.97); }
        .btn-close { background-color: #e0e0e0; color: #333; }
        .btn-close:active { background-color: #ccc; transform: scale(0.97); }
        h1 { color: var(--primary-dark); font-size: 22px; font-weight: 700; }
        @media (prefers-color-scheme: dark) {
            body { background-color: #1a2e2e !important; }
            .instruction-card { background-color: #243b3b; border-color: #2e4a4a; }
            .instruction-card h2 { color: #80cbc4; border-bottom-color: #4db6ac; }
            .instruction-card ul li { color: #d0e0e0; }
            .instruction-card ul li strong { color: #80cbc4; }
            h1 { color: #80cbc4; }
            .btn-close { background-color: #3a4a4a; color: #ddd; }
            .btn-back { background-color: #4db6ac; }
        }
    </style>
</head>
<body>
    <h1>📋 АРМ Амбулаторная история</h1>
    <div class="instruction-card">
        <h2>Пошаговая инструкция</h2>
        <ul>
            <li><strong>Ввели пароль и нажали «ОК»,\n если у мед.сестры несколько отделений, \nто в выпадающем окне необходимо выбрать нужное отделение и нажать «да».</strong></li>
        </ul>
    </div>
    <div class="nav-buttons">
        <a href="index.html" class="btn-back">← Назад к списку</a>
        <button class="btn-close" id="closeApp">Закрыть</button>
    </div>
    <script src="https://dev.max.ru/js/bridge.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (window.MAXBridge) window.MAXBridge.ready();
            document.getElementById('closeApp').addEventListener('click', function() {
                if (window.MAXBridge) window.MAXBridge.close();
                else alert('Закрытие (в MAX)');
            });
        });
    </script>
</body>
</html>
