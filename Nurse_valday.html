<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Для медицинских сестёр(Валдай амбулатория)</title>
    <link rel="stylesheet" href="https://dev.max.ru/ui/main.min.css">
    <style>
        :root { --primary-teal: #26a69a; --primary-dark: #00897b; --primary-light: #e0f2f1; --card-shadow: rgba(38,166,154,0.12); }
        body { background-color: var(--primary-light) !important; color: #1a2a2a; font-family: -apple-system, sans-serif; padding: 16px; margin: 0; min-height: 100vh; }
        .container { max-width: 800px; margin: 0 auto; padding-bottom: 100px; }
        .instruction-card { background-color: #fff; border-radius: 16px; padding: 20px 18px; margin-bottom: 18px; box-shadow: 0 4px 12px var(--card-shadow); border: 1px solid rgba(38,166,154,0.08); }
        .instruction-card .section img { max-width: 100%; height: auto; border-radius: 8px; margin: 8px 0 12px; border: 1px solid #e0e0e0; }
        .instruction-card .section video { max-width: 100%; border-radius: 8px; margin: 8px 0; }
        .back-link { display: inline-block; margin-bottom: 16px; color: var(--primary-teal); text-decoration: none; font-weight: 500; }
        .back-link:hover { text-decoration: underline; }
        h1 { color: var(--primary-dark); font-size: 22px; font-weight: 700; }

        /* Оглавление */
        .toc {
            background: #fff;
            border-radius: 16px;
            padding: 16px 18px;
            margin-bottom: 20px;
            box-shadow: 0 4px 12px var(--card-shadow);
            border: 1px solid rgba(38,166,154,0.08);
        }
        .toc h3 {
            margin: 0 0 10px 0;
            color: var(--primary-dark);
            font-size: 17px;
        }
        .toc ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .toc ul li {
            margin: 0;
        }
        .toc ul li a {
            display: inline-block;
            padding: 6px 14px;
            background: var(--primary-light);
            border-radius: 20px;
            font-size: 14px;
            color: var(--primary-dark);
            text-decoration: none;
            transition: 0.15s;
            border: 1px solid rgba(38,166,154,0.1);
        }
        .toc ul li a:hover {
            background: var(--primary-teal);
            color: #fff;
        }

        /* Аккордеон (исправлен max-height) */
        .accordion-item {
            margin-bottom: 12px;
            border: 1px solid rgba(38,166,154,0.1);
            border-radius: 12px;
            overflow: hidden;
        }
        .accordion-header {
            padding: 14px 16px;
            background: var(--primary-light);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            color: var(--primary-dark);
            user-select: none;
            transition: background 0.2s;
        }
        .accordion-header:hover {
            background: #c8e6e0;
        }
        .accordion-icon {
            font-size: 14px;
            transition: transform 0.3s;
        }
        .accordion-item.open .accordion-icon {
            transform: rotate(90deg);
        }
        .accordion-body {
            padding: 0 16px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease, padding 0.3s ease;
        }
        .accordion-item.open .accordion-body {
            padding: 16px;
            max-height: 99999px; /* достаточно большое значение для длинного контента */
        }

        /* Фиксированная нижняя панель */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #fff;
            padding: 12px 16px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            box-shadow: 0 -2px 12px rgba(0,0,0,0.08);
            display: flex;
            gap: 12px;
            z-index: 999;
            border-top: 1px solid rgba(38,166,154,0.1);
        }
        .bottom-nav a, .bottom-nav button {
            flex: 1;
            text-align: center;
            padding: 14px 10px;
            border-radius: 30px;
            border: none;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: 0.15s;
        }
        .bottom-nav .btn-back {
            background: #e8ecec;
            color: #1a2a2a;
        }
        .bottom-nav .btn-back:active {
            background: #d0d7d7;
            transform: scale(0.97);
        }
        .bottom-nav .btn-close {
            background: var(--primary-teal);
            color: #fff;
            box-shadow: 0 4px 8px rgba(38,166,154,0.25);
        }
        .bottom-nav .btn-close:active {
            background: var(--primary-dark);
            transform: scale(0.97);
        }

        @media (prefers-color-scheme: dark) {
            body { background-color: #1a2e2e !important; }
            .instruction-card { background-color: #243b3b; border-color: #2e4a4a; }
            .instruction-card .section p, .instruction-card .section div { color: #d0e0e0; }
            h1 { color: #80cbc4; }
            .toc {
                background: #243b3b;
                border-color: #2e4a4a;
            }
            .toc h3 {
                color: #80cbc4;
            }
            .toc ul li a {
                background: #2a4a4a;
                color: #d0e0e0;
                border-color: #3a5a5a;
            }
            .toc ul li a:hover {
                background: #4db6ac;
                color: #fff;
            }
            .accordion-header {
                background: #2a4a4a;
                color: #80cbc4;
            }
            .accordion-header:hover {
                background: #3a5a5a;
            }
            .accordion-item {
                border-color: #2e4a4a;
            }
            .bottom-nav {
                background: #1e3a3a;
                border-top-color: #2e4a4a;
            }
            .bottom-nav .btn-back {
                background: #2e4a4a;
                color: #d0e0e0;
            }
            .bottom-nav .btn-back:active {
                background: #3a5a5a;
            }
            .bottom-nav .btn-close {
                background: #4db6ac;
            }
            .bottom-nav .btn-close:active {
                background: #26a69a;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="back-link">← Назад к списку</a>
    <h1>🩺 Для медицинских сестёр(Валдай амбулатория)</h1>
    <p style="color: #4d6b6b; margin-bottom: 16px;">Инструкции для медицинских сестёр(Валдай амбулатория)</p>
    
    
    
    <div class="instruction-card">
        <div class="empty-state">В этой категории пока нет инструкций.</div>
    </div>
</div>

<div class="bottom-nav">
    <a href="index.html" class="btn-back">← Назад к списку</a>
    <button class="btn-close" id="closeApp">Закрыть</button>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // ---- Аккордеон ----
        const headers = document.querySelectorAll('.accordion-header');
        headers.forEach(header => {
            header.addEventListener('click', function() {
                const item = this.closest('.accordion-item');
                if (item) {
                    // Закрываем другие открытые (опционально)
                    // const openItems = document.querySelectorAll('.accordion-item.open');
                    // openItems.forEach(oi => { if (oi !== item) oi.classList.remove('open'); });
                    item.classList.toggle('open');
                }
            });
        });

        // ---- Закрытие мини-приложения ----
        const closeBtn = document.getElementById('closeApp');
        if (closeBtn) {
            closeBtn.addEventListener('click', function() {
                if (window.MAXBridge && typeof window.MAXBridge.close === 'function') {
                    window.MAXBridge.close();
                    return;
                }
                if (window.WebApp && typeof window.WebApp.close === 'function') {
                    window.WebApp.close();
                    return;
                }
                if (typeof window.close === 'function') {
                    window.close();
                } else {
                    alert('Закрытие (в MAX)');
                }
            });
        }

        // Инициализация MAXBridge (если доступен)
        if (window.MAXBridge && typeof window.MAXBridge.ready === 'function') {
            window.MAXBridge.ready();
        }
    });
</script>
</body>
</html>
