<head>

    <style>
        :root {

        }
        .container {

        }
        h1 {
            color: var(--primary-dark);

            margin: 0 0 8px 0;

            align-items: center;
            gap: 12px;
        }
        .flex-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .sidebar {
            flex: 0 0 280px;
            background: #fff;
            border-radius: 16px;
            padding: 16px 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid rgba(38,166,154,0.08);
        }
        .sidebar ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .sidebar li {
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.15s;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .sidebar li:hover {
            background: var(--primary-light);
        }
        .sidebar li.active {
            background: var(--primary-teal);
            color: #fff;
        }
        .content {
            flex: 1;
            min-width: 0;
        }
        .instruction-card {
            background: #fff;
            border-radius: 16px;
            padding: 20px 20px 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border: 1px solid rgba(38,166,154,0.08);
        }
        .instruction-card h2 {
            margin: 0 0 16px 0;
            color: var(--primary-dark);
            font-size: 20px;
            border-bottom: 2px solid var(--primary-teal);
            padding-bottom: 10px;
        }
        .instruction-card .section {
            margin-bottom: 24px;
        }
        .instruction-card .section:last-child {
            margin-bottom: 0;
        }
        .instruction-card .section img {
            max-width: 100%;
            border-radius: 8px;
            margin: 8px 0 12px;
            border: 1px solid #e0e0e0;
        }
        .instruction-card .section p, .instruction-card .section div {
            line-height: 1.6;
            font-size: 15px;
        }
        .instruction-card .section ul, .instruction-card .section ol {
            padding-left: 20px;
        }
        .back-button {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background: var(--primary-teal);
            color: #fff;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            text-align: center;
            box-sizing: border-box;
            box-shadow: 0 4px 8px rgba(38,166,154,0.25);
        }
        .back-button:active {
            background: var(--primary-dark);
            transform: scale(0.97);
        }
        .empty-state {
            text-align: center;
            color: #889999;
            padding: 40px 20px;
        }
        .badge {
            background: var(--primary-teal);
            color: #fff;
            border-radius: 20px;
            padding: 2px 10px;
            font-size: 12px;
            margin-left: auto;
        }
        @media (prefers-color-scheme: dark) {
            body { background-color: #1a2e2e !important; }

            .badge { background: #4db6ac; }
            .back-button { background: #4db6ac; }
        }
        @media (max-width: 768px) {
            .sidebar { flex: 1 1 100%; max-height: 200px; }
            .flex-row { flex-direction: column; }
        }
    </style>
</head>

                        "content": "<span style=\"font-size:24px\">1.1.\tНаходятся в папке Общие – ВК_ЦП </span><br><br><img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1783695137361-623716163.png\" alt=\"\"><br><br><span style=\"font-size:24px\">1.2.\tВ каждом врачебном протоколе (первичный, повторный) создан раздел ВК: </span><br><br><img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1783695181627-654077142.png\" alt=\"\"><br><br><span style=\"font-size:24px\">1.3.\tВыбираем нужное, заполняем все необходимо в протоколе, далее подписываем ЭЦП, далее автоматически будет добавлен протокол -  «Выписки из протокола подкомиссии по ЭВН».<br>Осмотр подписывает врачом, Выписка подписывается ЭП членами комиссии и председателем.<br>1.4.\tЭпикриз ЭВН (прошедший период), далее Выписка из протокола Прошедший период<br>Эпикриз подписывается врачом, Выписка членами комиссии и председателем.<br>1.5.\tЭпикриз на подкомиссию по ЭВН (Дубликат), далее Выписка из протокола подкомиссии по ЭВН (Дубликат)<br>Эпикриз подписывается врачом, Выписка членами комиссии и председателем.<br>1.6.\tВыписка из протокола ЭВН МСЭ<br>•\t В каждом врачебном протоколе (первичный, повторный) создан раздел МСЭ</span><br><br><img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1783695232862-63986201.png\" alt=\"\"><br><br><span style=\"font-size:24px\">Первая строчка для варианта когда мы направляем на ОБСЛЕДОВАНИЯ, необходимых для получения клинико-фукнциональных данных.<br>Вторая строчка – когда уже выполнены исследования и пациента направлен на подкомиссию по ЭВН для решения вопроса о направлении на МСЭ.<br>•\tПри формировании Выписки из протокола созданы варианты ЭВН МСЭ1 и ЭВН МСЭ2<br>ЭВН МСЭ 1 выбираем когда мы во врачебном протоколе выбрали первый вариант, т.е. для направления на обследования.<br>•\tЕсли мы уже направляем для решения вопроса о направлении на МСЭ выбираем протокол «Выписка из протокола ЭВН МСЭ 2», где мы выбираем нужные значения.  <br>•\tСтрочку с точкой мы пользуемся только в случае когда основания для МСЭ НЕ ВЫЯВЛЕНЫ. </span><br><br><img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1783695281354-97221933.png\" alt=\"\"><br><br><span style=\"font-size:24px\">1.7\t. Контроль заведующего (Для ЭЛН)<br>Если в протоколе специалиста, заполнено поле Контроль заведующего.. заполняем все необходимо в протоколе, далее подписываем ЭЦП, далее автоматически будет добавлен протокол , автоматически будет добавлен протокол «Контроль заведующего (ЭВН)»<br>Осмотр подписывается врачом, Контроль заведующего подписывается -  ЭП  председателем и заместителем. <br></span>"

            {

                "title": "АЛГОРИТМ РАБОТЫ ВО ВКЛАДКЕ СТАНДАРТЫ МЕД. ПОМОЩИ",
                "sections": [
                    {
                        "type": "text",
                        "content": "<span style=\"color:#ff8888\">1.\t<span style=\"font-size:24px\">ПЕРЕД ДОБАВЛЕНИЕМ СТАНДАРТА ЛЕЧЕНИЯ, НЕОБХОДИМО ЗАПОЛНИТЬ ТАЛОН И ОБЯЗАТЕЛЬНО  ПРОСТАВИТЬ ДИАГНОЗ</span>.</span><br><br><span style=\"color:#ff8888\">**2.\t<span style=\"font-size:24px\">ПЕРЕХОДИМ ВО ВКЛАДКУ СТАНДАРТЫ МЕД. ПОМОЩИ</span>:**</span><br><br><img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1782215849870-253277279.png\" alt=\"\"><br><br><span style=\"font-size:24px\">- жмём добавить;<br>- выбираем подходящую группу;<br>- жмём «Да»;</span><br><br><img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1782226649395-575472931.png\" alt=\"\"><br><span style=\"font-size:24px\"><br>- всплывет еще одно окно-  Жмём «ОК»; </span><br><br><span style=\"color:#ff8888\">**<span style=\"font-size:24px\">3. УСЛУГИ ПО ВЫБРАННОМУ СТАНДАРТУ</span>**</span><br><br><img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1782227141091-752499920.png\" alt=\"\"><br><br><span style=\"font-size:24px\">Чуть ниже появится панель с вкладками. Во вкладке услуги -  отображается все , что входит в выбранный стандарт.  </span><br><br><span style=\"color:#ff8888\">**<span style=\"font-size:24px\">4. ПЛАНИРУЕМ ВИЗИТ ПАЦИЕНТА НА КОНСУЛЬТАЦИЮ К СПЕЦИАЛИСТУ</span>**</span><br><br><span style=\"font-size:24px\">1)\tВыбрали услугу: Приём врача – терапевта – жмём «Запланировать» - автоматически проставляется текущая дата. <br>2) Для редактирования даты : Либо  вводите дату сразу в услуге приёма и жмёте ENTER. Либо перейдите во вкладку   планируемые услуги, и изменить дату. (Если нет данной вкладке в АРМе «Врач Поликлиники» сообщите, добавим)</span><br><br><img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1782227496588-424635786.png\" alt=\"\"><br><br><span style=\"color:#ff8888\">**<span style=\"font-size:24px\">5. ЗАПИСЬ К СПЕЦИАЛИСТУ</span>**</span><br><br><img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1782228314596-325389743.png\" alt=\"\"><br><br><span style=\"font-size:24px\">Во вкладке (сверху) «Планируемые услуги»: вы можете произвести запись на прием к специалистам.<br>1)\tЖмём « Обработать (номерок)» - ввели ФИО специалиста, выбрали нужную дату, время. – далее «Выдать» </span><br><br><br><img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1782228409471-900423747.png\" alt=\"\"><br><br><img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1782228438638-916230842.png\" alt=\"\"><br><br><span style=\"font-size:24px\"> Откроется окно подтверждения: Кликаем  два раза левой кнопкой мыши на время справа – «Выдать»</span><br>\t<br><img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1782228775643-770615195.png\" alt=\"\"><br><br><span style=\"font-size:24px\">2)\t Либо пациента записывают в регистратуре. (При этом, не стоит жать «Обработать номерок»). Требуется распечатать маршрут записи: </span><br><br><img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1782228842727-709475708.png\" alt=\"\"><br><br><span style=\"font-size:24px\">После того, как нажали запланировать запись, жмём сверху «Печать» - печатаете документ и отправляете пациента в регистратуру.  </span><br><br>**<span style=\"color:#ff8888\"><span style=\"font-size:24px\">6. ФОРМИРОВАНИЕ НАПРАВЛЕНИЙ НА ДИАГНОСТИЧЕСКИЕ ИССЛЕДОВАНИЯ</span></span>**<br><br><img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1782229183329-617041817.png\" alt=\"\"><br><br><span style=\"font-size:24px\">Во вкладке диагностика: <br>•\tВыбрали исследование из перечня: нажали « + Назначить»  - откроется стандартное направление на исследование – указали цель, проверили данные, - «Сохранить».<br>•\tПечатаете направление, после пункта выше.</span><br><br><img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1782229238583-279405884.png\" alt=\"\"><br><br>**<span style=\"color:#ff8888\"><span style=\"font-size:24px\">7. ФОРМИРОВАНИЕ НАПРАВЛЕНИЙ НА ЛАБОРАТОРНЫЕ ИССЛЕДОВАНИЯ.</span></span>**<br><br><img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1782229350275-569028174.png\" alt=\"\"><br><br><span style=\"font-size:24px\">Во вкладке «Лаборатория» выбираем исследования, отмечаем «пробелом», жмём «+Назначить», проверяем шифр и жмём «Да», (правило для ГКДЦ1 остается, как и в обычном приеме - только ОМС) </span><br><br><img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1782229399644-153917425.png\" alt=\"\"><br><br><span style=\"font-size:24px\">По кнопке печать из этой же вкладки вы смежите подтвердить лаб. исследование и отправить на печать направление.  </span><br><br>**<span style=\"color:#ff8888\"><span style=\"font-size:24px\">8. ИНФОРМАЦИЯ ПО КЛИНИЧЕСКИМ РЕКОМЕНДАЦИЯМ</span>.</span>**<br><br><img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1782229506358-881978552.png\" alt=\"\"><br><br><span style=\"font-size:24px\">Во вкладке стандарты мед. помощи – жмём на   - откроется краткая информация по диагнозу - далее жмём «ДОКУМЕНТ» - откроется документ по Клин. Рекомендациям  утвержденный  МЗ РФ</span>"

                    {
                        "type": "text",
                        "content": "1.\tДанная справка заполняется во вкдке «История» - «Протоколы». \n2.\tНажимаем «Добавить»\n3.\tФорма находится в папке «Поликлиника ЦП» - «Справки» -«Медицинская справка 086/у (врачебное профессионально- консультативное заключение)»\n\n<img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1782230215827-217849129.png\" alt=\"\">\n\n4.\tЗаполняем протокол.\n- поля помеченные красной звездочкой, и выделенные оранжевым цветом обязательны     для заполнения;\n- наименование поля выделенное синим цветом обозначает заполнение из справочника, путем нажатия на «Enter»;\n- серый цвет наименования  поля обозначает заполнение путем ручного ввода данных.\n\n<img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1782230263266-908383399.png\" alt=\"\">\n\n5.\tПодписываем протокол"
                    }
                ]
            },
            {
                "id": 5,
                "title": "Амбулаторный приём",
                "sections": [
                    {
                        "type": "text",
                        "content": "\n<img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1782484928416-571256289.png\" alt=\"\">\n\n1.\tОткрывается вкладка «Амбулаторный прием», где отображается список пациентов на заданный период дат, по умолчанию текущая дата. \n*Красные пациенты, которые по времени опоздали на пол часа, \n*Зеленые - обработанные. \n\nНажимаем 2 раза на строчку с пациентом.\n\n<img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1782485025813-625551307.png\" alt=\"\">\n\n2.  При первом открытии электронной истории, открывается окно с выбором типа посещения, выбираем тип, либо привязываем к предыдущему посещению для продолжения случая.\n**ОТКРЫВ ПОСЕЩЕНИЕ, ЗАПОЛНЕНИЕ ТАЛОНА ОБЯЗАТЕЛЬНО!**\n\n"
                    }
                ]
            },
            {
                "id": 6,
                "title": "Оформление протокола осмотра пациента",
                "sections": [
                    {
                        "type": "text",
                        "content": "\n<img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1782485350219-98017117.png\" alt=\"\">\n\n1.\tПосле выбора типа случая -  попадаем в электронную историю болезни во вкладки «История/Протоколы», для добавления протокола нажимаем кнопку «Добавить».\n\n<img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1782485417193-774508655.png\" alt=\"\">\n\n2. Выбираем необходимый протокол из списка форм.\n \n \n<img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1782485484585-929277205.png\" alt=\"\">\n\n<img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1782485511047-477181115.png\" alt=\"\">\n\n3. Синие поля вопросов протокола открывают варианты ответа, при нажатии на белую строку 2 раза, в серых полях нет ответов – сводобный ввод текста, в синих тоже доступен свободный ввод.\nНесколько вариантов ответа можно выбрать, удерживая Ctrl, либо выделяя поля пробелом. При выборе ответа можно добавить свой вариант, нажав кнопку «Свое значение» и заполнив поле «Полный текст».\n\n<img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1782485608290-136506403.png\" alt=\"\">\nДля перехода на новую строку необходимо нажать клавиши Ctrl + Enter.\nПоявились поля обязательные к заполнению, отмечены красной звездочкой. (И подсвечены темно-желтым цветом) "
                    }
                ]
            },
            {
                "id": 7,
                "title": "Сохранение шаблона/ заполнение протокола по шаблону",
                "sections": [
                    {
                        "type": "text",
                        "content": "\n<img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1782485759455-541101673.png\" alt=\"\">\n\n1.\tДля сохранения шаблона по протоколу необходимо нажать на кнопку \"Сохранить как шаблон\", выбрав типа шаблона для сортировки шаблона и заполнение шаблона с сохранением пустых полей, либо с сохранением только заполненных полей. Вводим название шаблона и нажимаем кнопку «Сохранить». Если требуется, можете создать группу, где будут все ваши личные шаблоны. \n\n<img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1782485819312-148097700.png\" alt=\"\">\n\n2. \tДля выбора шаблона нажимаем кнопку \"По шаблону\" и ищем шаблон по поиску во всех, общих или личных шаблонах, кликаем на шаблон и нажимаем кнопку \"Да\".\n  \tПосле заполнения протокола по шаблону, можно вручную добавить текст в нужные строчки. "
                    }
                ]
            },
            {
                "id": 8,
                "title": "Заполнение протокола путем копирования из истории",
                "sections": [
                    {
                        "type": "text",
                        "content": "<br><img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1782485949987-402602289.png\" alt=\"\"><br><br><span style=\"font-size:24px\">1. \tДля копирования из истории необходимо нажать на кнопку \"Копировать из истории\", в окне \"События истории лечения\" можно выбрать протоколы, добавленные на прошлых посещениях. <br>После выбора протокола, выбираются конкретные поля для переноса, либо все поля в окне \"Контролируемые вопросы\". Так же можно копировать из других протоколов, открыв вкладки \"Все события\" или \"История\" с помощью правой кнопки мыши Копировать\\Вставить либо Ctrl + C , Ctrl + V. <br>\t\t\t</span><br><img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1782486154124-829741071.png\" alt=\"\"><br><br><span style=\"font-size:24px\">2. \tОбратите внимание! Если вы копируете информацию не из подобного протокола (пример: в прием добавили протокол осмотр терапевта - а копируете из протокола проф. осмотр офтальмолога) то, можно копировать информацию только для  одинаковых строчек. <br>•\tКрасным  – то, что можно скопировать (текст ярко серый);<br>•\tСиний- то, что нельзя копировать (текст бледно серый); </span><br><br><img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1782486260953-117440066.png\" alt=\"\"><br><span style=\"font-size:24px\"><br>3.\tПри копировании может появиться окно (см. скрин ниже *В форме есть несохраненные данные. Сохранить перед копированием*), выбираете подходящий вариант, после данные скопируются.  <br><br>После заполнения протокола копированием из истории, можно вручную добавить текст в нужные строчки. </span>"
                    }
                ]
            },
            {
                "id": 9,
                "title": "Заполнение протокола путем копирования из событий",
                "sections": [
                    {
                        "type": "text",
                        "content": "\nКопирование из события: слева протокол - в центе: строчки выбранного протокола и его содержание, справа: выбираете строчку добавленного вами протокола на приёме. (Т.е. куда будете копировать).\n\t\t\n<img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1782486473635-445282785.png\" alt=\"\">\n\nЕсли хотите добавить текст к уже существующему, то мышку (курсор) ставим рядом.\nЕсли хотите заменить введенные  данные или ответ по умолчанию, то выделяете текст в строчке (в окне справа), после выбираете  (в центре),  что хотите скопировать, два раза кликаем = информация скопируется и перезапишет данные. \nПо окончанию, жмем «Ок»\n\n<img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1782486541609-681549520.png\" alt=\"\">\n"
                    }
                ]
            },
            {
                "id": 10,
                "title": "Заполнение и подписание протокола",
                "sections": [
                    {
                        "type": "text",
                        "content": "\n<img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1782486691463-652494367.png\" alt=\"\">\n\nПоля с красной звездочкой обязательны к заполнению.\nЖмём «Закрыть», затем, Подписываем протокол \n<img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1782486769079-500478093.png\" alt=\"\">\n  и только после этого печатаем его. \nПожалуйста, убедитесь, что у вас есть личный ключ цифровой электронной подписи. Также не забудьте проставить диагноз в талоне.\n** Все поля СЭМД размещены в конце любого протокола. Они заполняются автоматически (серые строки), а белые строки содержат ответы по умолчанию, которые могут быть удалены при копировании и использовании шаблонов.\n\n<img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1782486888845-802350273.png\" alt=\"\">\n\n\tЕсли поле пустое, нужно кликнуть по строке и выбрать ответ из справочника.\n\t\n<img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1782486985095-830965710.png\" alt=\"\">\n\nДля печати протокола нажимаем кнопку «Печать», \n* Печать без ЭЦП, подписываем ручкой.\n* Печать с ЭЦП, формируется протокол осмотра с цифровой подписью\n"
                    }
                ]
            },
            {
                "id": 11,
                "title": "Лабораторные исследования",
                "sections": [
                    {
                        "type": "text",
                        "content": "\n<img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1782487093234-256603163.png\" alt=\"\">\n\nДля добавления направлений на лабораторные исследования необходимо перейти во вкладку «Лаборатория» и нажать кнопку «Добавить».\n\n<img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1782487146603-772518911.png\" alt=\"\">\n\n**ЖЕЛТЫЙ КРУГ - УСЛУГИ КДЛ 122**\n\n<img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1782487215311-919438771.png\" alt=\"\">\n\n**Лабораторные исследования можно выбрать по материалу исследования\\группе\\шаблону. **\n\t\n**\tВо вкладке «шаблоны» для Вашего удобства созданы шаблоны по специальностям/отделениям.**\n\nПосле выбора материала, отображаются все исследования по выбранному материалу, так же после выбора шаблона, отображаются все исследования находящиеся в шаблоне. Выбираем исследование, выделив его и нажав кнопку \"Выбрать\" или кликнув на него 2 раза, после чего оно попадает в «Содержание заказа». Удалить можно выделив исследование в окне «Содержание заказа» либо кликнув на него 2 раза. После добавления всех исследований нажимаем кнопку «Да».\n\n<img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1782487336784-892566179.png\" alt=\"\">\n\n### Лабораторные исследования ГКДЦ №1 необходимо создавать **отдельным заказом. **\n***(Отдельно формируем из каждой папки (Кровь, кал, моча,  и тд.)***\n\n<img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1782487568854-554563703.png\" alt=\"\">\n\nНаправление появляется в списке лабораторных исследований, после чего при необходимости его можно изменить \\ удалить, если всё добавлено, верно, то «Подтверждаем» исследование и нажимаем кнопку «Печать». \nПодтвержденное исследование удалить уже нельзя, если по какой-то причине исследование не нужно выполнять, то выбираем исследование и нажимаем кнопку «Аннулировать».\n\n<img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1782487618135-195926590.png\" alt=\"\">\n\n**При добавлении Валдайских услуг сработает проверка!**\n"
                    }
                ]
            },
            {
                "id": 12,
                "title": "Школа здоровья",
                "sections": [
                    {
                        "type": "text",
                        "content": "<span style=\"font-size:24px\"><span style=\"color:#FAEBD7\">Основа ведения пациентов по школе здоровья заключается в следующем: </span></span><br><span style=\"font-size:24px\">1.\tОбщие условия.</span><br><span style=\"font-size:20px\">1.1.\t Посещение пациента должно быть по шифру/полису «ОМС»;;<br>1.2.\t Цель посещения: Школы для хр. больных – (26);<br>1.3.\t Специальность врача;<br>1.4.\tДиагноз<br>1.5.\tНаличие ДН группы у пациента (если требуется по соответствующему диагнозу)<br>1.6.\tКоличество посещений </span><br><span style=\"font-size:24px\">2.\tТАЛОН.</span><br><br><img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1784269942537-815495853.png\" alt=\"\"><br><br><span style=\"font-size:20px\">\tТип посещения: ПО СЛУЧАЮ;<br>\tЦель посещения: ШКОЛЫ ДЛЯ ХР. БОЛЬНЫХ – (26);<br>\tДиагноз;<br>\tРезультат обращения: (ИСХОД, РЕЗ,ЛЕЧЕНИЯ, ЗАКОНЧЕННОСТЬ);</span><br><br><span style=\"font-size:24px\">2.1.\t МЭС.</span><br><span style=\"font-size:20px\">Переходим во вкладку МЭС – жмём открыть МЭС - Кликаем в строчку – код МЭС – выбираем нужный код (будет один вариант) жмём «ДА»; </span><br><span style=\"font-size:24px\">УСЛУГ ПО МЭСу НЕТ</span><br><br><img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1784270034721-50828453.png\" alt=\"\"><br><br><span style=\"font-size:20px\">2.2 Схема ведения МЭСа по ШЗ и соответвия количества посещений типу МЭСа</span><br><br><img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1784270087455-53162314.png\" alt=\"\"><br>"
                    }
                ]
            },
            {
                "id": 13,
                "title": "Назначение диагностических исследований",
                "sections": [
                    {
                        "type": "text",
                        "content": "<br><img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1784270690720-444004965.png\" alt=\"\"><br><br><span style=\"font-size:24px\">1.\tДля добавления диагностического исследования необходимо перейти во вкладку «Диагностика» и нажать кнопку «Добавить».</span><br><br><img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1784270762952-226698259.png\" alt=\"\"><br><br><span style=\"font-size:24px\">2.\tВыбираем тип исследования, (в КТ /Рентгене/МРТ есть разбивка по органам) в поиске ищем необходимый вид исследования. Нажимаем кнопку «Да» либо 2 раза кликаем на строку.</span><br><br><img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1784270825611-437649874.png\" alt=\"\"><br><br><span style=\"font-size:24px\">3.\tВыбираем Шифр плательщика при необходимости ОМС\\ДМС\\Бюджет\\Наличный расчет и т. д., если шифр остается прежний, то нажимаем кнопку «Сохранить». Также заполняем цель исследования. Это поможет врачу диагностического отделения понять, для чего будет произведено исследование. </span> <br><br><img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1784270908197-461392431.png\" alt=\"\"><br><br><span style=\"font-size:24px\">4. Направление появляется в списке диагностических исследований, выделяем его и нажимаем на кнопку «Печать».</span>"
                    }
                ]
            },
            {
                "id": 14,
                "title": "Заполнение талона и услуг посещения",
                "sections": [
                    {
                        "type": "text",
                        "content": "<br><img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1784290818045-614869169.png\" alt=\"\"><br><br><span style=\"font-size:24px\">1.\tЕсли необходимо, чтобы из протокола данные перенеслись в талон, то заполняем выделенные поля и диагноз, после чего нажимаем кнопку «Сохранить», затем   - подписать Цифровой электронной подписью. <br>(При подписании ЭЦП,  протокол автоматически закрывается, но данные в талон не переносятся).<br>!!!ПОЛЯ ТАЛОНА (ЦЕЛЬ, ИСХОД И ТД..) НАХОДЯТСЯ СВЕРХУ И ВНИЗУ ПРОТОКОЛОВ ОСМОТРА. <br></span><br><br><img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1784290925145-955213480.png\" alt=\"\"><br><br><span style=\"font-size:24px\">2.\tПереходим во вкладку \"Талон\", проверяем и заполняем поля: <br>•\t«Тип посещения»<br>•\t«Медсестра\"<br>•\t«Цель посещения»<br>•\t«Законченность»<br>•\t«Исход»<br>•\t«Результат лечения»<br>•\t«Диагноз»</span><br><br><img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1784290985336-332774071.png\" alt=\"\"><br><br><span style=\"font-size:24px\">3.\tПо целям посещения ДВН, ПМО, ДРЗ обязательно заполнение в талоне поля Диспансерный учёт. Даже на сопутствующем диагнозе.</span><br><br><img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1784291069808-259132364.png\" alt=\"\"><br><br><span style=\"font-size:24px\">4.\tДобавляем услугу с помощью кнопки «По врачу», либо кнопкой «Добавить».</span><br><br><img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1784291129333-705021061.png\" alt=\"\"><br><br><span style=\"font-size:24px\">5.\tВыставляем все добавленные услуги либо одну услугу в оплату по кнопке «Оплата»<br>6.\tДля сохранения талона нажимаем кнопку «Да» в нижнем правом углу.</span><br> <br>"
                    }
                ]
            },
            {
                "id": 15,
                "title": "Добавление услуги платным пациентам",
                "sections": [

М НЕ СЧИТАЮТСЯ! </span><br><br><span style=\"font-size:24px\">5.\tОткрытие МЭСа<br> Варианты МЭСов:   <br>\tднБСК; - БОЛЕЗНИ СИСТЕМЫ КРОВООБРАЩЕНИЯ<br>\tднОНК; - ОНКОЛОГИЧЕСКИЕ ЗАБОЛЕВАНИЯ<br>\tднДИАБ; - САХАРНЫЙ ДИАБЕТ У ВЗРОСЛЫХ <br>\tДиспНаб; -  ВСЕ ОСТАЛЬНОЕ, ЧТО НЕ ВХОДИТ В ГРУППЫ ВЫШЕ<br>Пример оформления: </span><br><br><img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1784556450879-241083006.png\" alt=\"\"><br><br><span style=\"font-size:24px\">•\tПриём: по ОМС;<br>•\tТип посещения: Разовое посещение;<br>•\tКод МЭС в списке будет соответствовать диагнозу и вашей специальности.<br>МЭС разового посещения закрываем день в день - проставляем: дату, тип закрытия - «выполнен полностью»- жмём «Закрыть МЭС».</span><br><br><span style=\"font-size:24px\"><span style=\"color:#FAEBD7\">Вариант МЭСа: </span><br>а(Специальность)-ДН-р<br>Т. к. посещение по случаю, то на 1-ом посещении открываем МЭС, на 2-ом посещении закрываем МЭС– проставляем дату закрытия и тип закрытия «Выполнен полностью» - «Закрыть МЭС»</span><br><br><img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1784556554113-928429086.png\" alt=\"\"><br><br><span style=\"font-size:24px\">ВАЖНО! Согласно тарифному соглашению в МЭС добавляется только прием врача.  Необходимые диагностические исследования и лаборатория добавляются в талоне.<br>При добавлении услуг «По врачу» появится список услуг, положенных при диспансерном наблюдении по соответствующим заболеваниям.<br>ВАЖНО!  У врача могут быть добавлены услуги по разным группам наблюдения. Обращайте внимание на начало кода услуги группы!<br>Начало наименования КОДа  УСЛУГИ\tДН по заболеванию:<br>днДиаб….\tИз группы Сахарный диабет<br>днБСК….. \tИз группы  Болезни системы кровообращения<br>днОНК…. \tИз группы Онкологические заболевания<br>днП…….\t   Из группы Прочие заболевания</span><br><br><img src=\"https://RomanDavidov.github.io/max_chat_bot_sznkc/1784556657028-174648999.png\" alt=\"\"><br>"

    // ---------- Рендеринг ----------
    const tocEl = document.getElementById('toc');
    const contentEl = document.getElementById('content');

    function buildTOC() {
        const ul = document.createElement('ul');
        instructionsData.instructions.forEach(item => {
            const li = document.createElement('li');
            li.textContent = item.title;
            li.dataset.id = item.id;
            li.addEventListener('click', () => loadInstruction(item.id));
            ul.appendChild(li);
        });
        tocEl.innerHTML = '';
        tocEl.appendChild(ul);
        // Загружаем первый элемент по умолчанию
        if (instructionsData.instructions.length > 0) {
            loadInstruction(instructionsData.instructions[0].id);
            const firstLi = tocEl.querySelector('li');
            if (firstLi) firstLi.classList.add('active');
        }
    }

    function loadInstruction(id) {
        const item = instructionsData.instructions.find(i => i.id === id);
        if (!item) return;
        // Обновляем активный пункт в оглавлении
        tocEl.querySelectorAll('li').forEach(li => li.classList.remove('active'));
        const activeLi = tocEl.querySelector(`li[data-id="${id}"]`);
        if (activeLi) activeLi.classList.add('active');

        // Рендерим контент
        let html = `<div class="instruction-card"><h2>${item.title}</h2>`;
        item.sections.forEach(section => {
            if (section.type === 'text') {
                html += `<div class="section">${section.content}</div>`;
            } else if (section.type === 'image') {
                html += `<div class="section"><img src="/files${section.src}" alt=""></div>`;
            }
        });
        html += '</div>';
        contentEl.innerHTML = html;
    }

    // Инициализация
    buildTOC();

    // MAX Bridge – закрытие
    document.getElementById('closeApp').addEventListener('click', function() {
        if (window.MAXBridge) {
            window.MAXBridge.close();
        } else {
            alert('Закрытие (в MAX)');
        }
    });
</script>
