<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Инструкции ИТ-отдела</title>
    <link rel="stylesheet" href="https://dev.max.ru/ui/main.min.css">
    <style>
        :root { --primary-teal: #26a69a; --primary-dark: #00897b; --primary-light: #e0f2f1; --card-shadow: rgba(38,166,154,0.12); }
        body { background-color: var(--primary-light) !important; color: #1a2a2a; font-family: -apple-system, sans-serif; padding: 16px; margin: 0; min-height: 100vh; }
        .menu-card { background-color: #fff; border-radius: 16px; padding: 20px; margin-bottom: 16px; box-shadow: 0 4px 12px var(--card-shadow); border: 1px solid rgba(38,166,154,0.08); display: flex; align-items: center; gap: 14px; cursor: pointer; transition: transform 0.1s; }
        .menu-card:active { transform: scale(0.97); }
        .menu-card .icon { font-size: 28px; }
        .menu-card .text { flex: 1; }
        .menu-card .text h3 { margin: 0 0 4px; color: var(--primary-dark); font-weight: 600; font-size: 17px; }
        .menu-card .text p { margin: 0; color: #4d6b6b; font-size: 14px; }
        .menu-card .arrow { font-size: 22px; color: var(--primary-teal); }
        h1 { color: var(--primary-dark); font-size: 24px; font-weight: 700; margin-top: 8px; margin-bottom: 4px; }
        .subhead { color: #4d6b6b; font-size: 15px; margin-top: 0; margin-bottom: 20px; }
        .back-button { display: inline-block; margin-top: 24px; padding: 14px 20px; background-color: var(--primary-teal); color: #fff; border: none; border-radius: 30px; font-size: 17px; font-weight: 500; cursor: pointer; width: 100%; text-align: center; box-sizing: border-box; box-shadow: 0 4px 8px rgba(38,166,154,0.25); transition: 0.2s; }
        .back-button:active { background-color: var(--primary-dark); transform: scale(0.97); }
        @media (prefers-color-scheme: dark) {
            body { background-color: #1a2e2e !important; }
            .menu-card { background-color: #243b3b; border-color: #2e4a4a; }
            .menu-card .text h3 { color: #80cbc4; }
            .menu-card .text p { color: #a0baba; }
            h1 { color: #80cbc4; }
            .subhead { color: #a0baba; }
            .back-button { background-color: #4db6ac; }
        }
    </style>
</head>
<body>
    <h1>📚 Инструкции по АРМ</h1>
    <p class="subhead">Выберите нужный раздел:</p>

    <a href="arm-vrach.html" style="text-decoration: none; color: inherit;">
        <div class="menu-card">
            <span class="icon">🩺</span>
            <div class="text">
                <h3>АРМ Врач</h3>
                <p>Работа с приёмом, назначениями, закрытие талонов</p>
            </div>
            <span class="arrow">→</span>
        </div>
    </a>

    <a href="arm-amb.html" style="text-decoration: none; color: inherit;">
        <div class="menu-card">
            <span class="icon">📋</span>
            <div class="text">
                <h3>АРМ Амбулаторная история</h3>
                <p>Поиск пациентов, создание карт, визиты, выписки</p>
            </div>
            <span class="arrow">→</span>
        </div>
    </a>

    <button class="back-button" id="closeApp">Закрыть инструкцию</button>

    <script src="https://dev.max.ru/js/bridge.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (window.MAXBridge) {
                window.MAXBridge.ready();
                console.log('MAXBridge готов (главная)');
            }
            const closeBtn = document.getElementById('closeApp');
            if (closeBtn) {
                closeBtn.addEventListener('click', function() {
                    if (window.MAXBridge) {
                        window.MAXBridge.close();
                    } else {
                        alert('Закрытие (в MAX это сработает)');
                    }
                });
            }
        });
    </script>
</body>
</html>
